<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1800" preserveAspectRatio="none">
  <defs>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="violetLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3e7ff" stop-opacity=".30"/>
      <stop offset=".45" stop-color="#b25cff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#6f2cff" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="glassLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset=".50" stop-color="#ffffff" stop-opacity=".38"/>
      <stop offset="1" stop-color="#b25cff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1800" fill="transparent"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- left constellation -->
    <g stroke="url(#violetLine)" stroke-width="1.8">
      <path d="M40 190 L150 95 L292 210 L430 120 L610 245"/>
      <path d="M150 95 L235 390 L142 620 L290 760 L190 1030"/>
      <path d="M292 210 L410 440 L585 360 L720 510"/>
      <path d="M142 620 L410 440 L545 705 L760 640"/>
      <path d="M290 760 L545 705 L690 910 L900 805"/>
      <path d="M190 1030 L365 1175 L285 1385 L485 1535 L760 1410"/>
      <path d="M365 1175 L690 910 L820 1160 L760 1410"/>
    </g>

    <!-- right constellation -->
    <g stroke="url(#violetLine)" stroke-width="1.8">
      <path d="M1180 145 L1340 70 L1510 200 L1735 95 L1960 210"/>
      <path d="M1340 70 L1290 360 L1445 525 L1390 805"/>
      <path d="M1510 200 L1445 525 L1650 675 L1805 545"/>
      <path d="M1390 805 L1650 675 L1740 960 L1970 880"/>
      <path d="M1120 1035 L1390 805 L1530 1165 L1805 1105"/>
      <path d="M1165 1435 L1530 1165 L1685 1450 L1970 1300"/>
      <path d="M1320 1640 L1685 1450 L1855 1680"/>
    </g>

    <!-- middle bridges, quieter -->
    <g stroke="#c9a1ff" stroke-opacity=".22" stroke-width="1.4">
      <path d="M610 245 L850 350 L1065 260 L1180 145"/>
      <path d="M720 510 L945 630 L1290 360"/>
      <path d="M900 805 L1120 1035"/>
      <path d="M760 1410 L1030 1285 L1165 1435"/>
    </g>

    <!-- glass shards -->
    <g stroke="url(#glassLine)" stroke-width="2.4">
      <path d="M40 190 L235 390"/>
      <path d="M142 620 L290 760"/>
      <path d="M690 910 L900 805"/>
      <path d="M1340 70 L1510 200"/>
      <path d="M1445 525 L1650 675"/>
      <path d="M1530 1165 L1685 1450"/>
    </g>

    <!-- transparent polygon facets -->
    <g stroke="#b25cff" stroke-opacity=".18" stroke-width="1">
      <path d="M150 95 L292 210 L235 390 L40 190 Z"/>
      <path d="M410 440 L545 705 L760 640 L720 510 Z"/>
      <path d="M1390 805 L1650 675 L1740 960 L1530 1165 Z"/>
      <path d="M1165 1435 L1530 1165 L1685 1450 L1320 1640 Z"/>
    </g>
  </g>

  <g filter="url(#glow)">
    <g fill="#f4e8ff" fill-opacity=".82">
      <circle cx="150" cy="95" r="3.2"/>
      <circle cx="292" cy="210" r="2.4"/>
      <circle cx="430" cy="120" r="3.6"/>
      <circle cx="235" cy="390" r="2.5"/>
      <circle cx="142" cy="620" r="2.1"/>
      <circle cx="410" cy="440" r="2.7"/>
      <circle cx="545" cy="705" r="2.4"/>
      <circle cx="690" cy="910" r="3.0"/>
      <circle cx="365" cy="1175" r="2.3"/>
      <circle cx="760" cy="1410" r="3.2"/>

      <circle cx="1340" cy="70" r="3.8"/>
      <circle cx="1510" cy="200" r="2.6"/>
      <circle cx="1735" cy="95" r="2.2"/>
      <circle cx="1290" cy="360" r="2.9"/>
      <circle cx="1445" cy="525" r="2.5"/>
      <circle cx="1650" cy="675" r="3.1"/>
      <circle cx="1740" cy="960" r="2.3"/>
      <circle cx="1530" cy="1165" r="3.0"/>
      <circle cx="1685" cy="1450" r="3.4"/>
      <circle cx="1320" cy="1640" r="2.5"/>
    </g>
    <g fill="#b25cff" fill-opacity=".30">
      <circle cx="430" cy="120" r="13"/>
      <circle cx="690" cy="910" r="11"/>
      <circle cx="1340" cy="70" r="17"/>
      <circle cx="1650" cy="675" r="13"/>
      <circle cx="1685" cy="1450" r="15"/>
    </g>
  </g>
</svg>
